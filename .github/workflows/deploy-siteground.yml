name: Deploy website to SiteGround

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website files
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SITEGROUND_SSH_KEY }}" > ~/.ssh/siteground_key
          chmod 600 ~/.ssh/siteground_key
          ssh-keyscan -p "${{ secrets.SITEGROUND_PORT }}" "${{ secrets.SITEGROUND_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare production files
        run: |
          rm -rf .deploy
          mkdir -p .deploy

          find . -maxdepth 1 -type f \( \
            -name "*.html" -o \
            -name "*.css" -o \
            -name "*.js" -o \
            -name "*.php" -o \
            -name ".htaccess" -o \
            -name "robots.txt" -o \
            -name "sitemap.xml" \
          \) -exec cp {} .deploy/ \;

          mkdir -p .deploy/assets
          rsync -a \
            --include="*/" \
            --include="*.webp" \
            --include="*.svg" \
            --include="*.css" \
            --include="*.js" \
            --exclude="*" \
            assets/ .deploy/assets/

      - name: Sync files to SiteGround public_html
        run: |
          rsync -az \
            --delete \
            --exclude=".well-known/" \
            -e "ssh -i ~/.ssh/siteground_key -p ${{ secrets.SITEGROUND_PORT }}" \
            .deploy/ "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}:${{ secrets.SITEGROUND_PATH }}"

      - name: Clear SiteGround cache when available
        run: |
          ssh -i ~/.ssh/siteground_key -p "${{ secrets.SITEGROUND_PORT }}" \
            "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}" \
            "if command -v wp >/dev/null 2>&1 && [ -f '${{ secrets.SITEGROUND_PATH }}/wp-config.php' ]; then wp sg purge --path='${{ secrets.SITEGROUND_PATH }}' --allow-root; else echo 'Static site deployed; WordPress cache purge skipped.'; fi"
